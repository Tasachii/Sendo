name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy   # create the local SQLite db for tests
      - run: npm run lint                # ESLint must pass with zero errors
      - run: npm run test:coverage       # full suite + v8 coverage thresholds (gates the PR)
      - run: npm run build               # type-checks + bundles every route
